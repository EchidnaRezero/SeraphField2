<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seraph Field Lobby Sample</title>
<style>
  @font-face { font-family: "Teko"; src: url("assets/teko-400.ttf") format("truetype"); font-style: normal; font-weight: 400; font-display: swap; }
  @font-face { font-family: "Teko"; src: url("assets/teko-500.ttf") format("truetype"); font-style: normal; font-weight: 500; font-display: swap; }
  @font-face { font-family: "Teko"; src: url("assets/teko-600.ttf") format("truetype"); font-style: normal; font-weight: 600; font-display: swap; }
  @font-face { font-family: "Teko"; src: url("assets/teko-700.ttf") format("truetype"); font-style: normal; font-weight: 700; font-display: swap; }
  @font-face { font-family: "Noto Sans KR"; src: url("assets/noto-sans-kr-300.ttf") format("truetype"); font-style: normal; font-weight: 300; font-display: swap; }
  @font-face { font-family: "Noto Sans KR"; src: url("assets/noto-sans-kr-400.ttf") format("truetype"); font-style: normal; font-weight: 400; font-display: swap; }
  @font-face { font-family: "Noto Sans KR"; src: url("assets/noto-sans-kr-500.ttf") format("truetype"); font-style: normal; font-weight: 500; font-display: swap; }
  @font-face { font-family: "Noto Sans KR"; src: url("assets/noto-sans-kr-700.ttf") format("truetype"); font-style: normal; font-weight: 700; font-display: swap; }
  @font-face { font-family: "Share Tech Mono"; src: url("assets/share-tech-mono-400.ttf") format("truetype"); font-style: normal; font-weight: 400; font-display: swap; }

  :root {
    color-scheme: dark;
    --font-ui: "Teko", "Arial Narrow", "Bahnschrift Condensed", sans-serif;
    --font-body: "Noto Sans KR", "Malgun Gothic", "Segoe UI", sans-serif;
    --font-mono: "Share Tech Mono", "Cascadia Mono", Consolas, monospace;
    --bg: #0e1012;
    --lobby-bg: #061014;
    --panel-soft: rgba(0, 0, 0, 0.3);
    --cyan: #19b8be;
    --icon: rgba(196, 220, 222, 0.72);
    --text: #e0fbfc;
  }

  * { box-sizing: border-box; }

  html,
  body { margin: 0; min-width: 320px; min-height: 100%; background: var(--lobby-bg); }

  body {
    min-height: 100vh;
    color: var(--text);
    font-family: var(--font-body);
    line-height: 1.75;
  }

  body::before,
  body::after {
    position: fixed;
    inset: 0;
    z-index: 20;
    pointer-events: none;
    content: "";
  }

  body::before {
    opacity: 0.5;
    background: linear-gradient(to bottom, transparent, transparent 50%, rgba(0, 0, 0, 0.2) 50%, rgba(0, 0, 0, 0.2));
    background-size: 100% 4px;
  }

  body::after {
    z-index: 19;
    background: radial-gradient(circle, transparent 60%, rgba(0, 10, 20, 0.85) 100%);
  }

  a { color: inherit; text-decoration: none; }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
  }

  .sf-app {
    position: relative;
    z-index: 1;
    isolation: isolate;
    min-height: 100vh;
  }

  .icon-button {
    display: inline-grid;
    width: 38px;
    height: 38px;
    place-items: center;
    flex: 0 0 auto;
    border: 1px solid transparent;
    background: transparent;
    color: var(--icon);
  }

  .icon-button:hover {
    border-color: rgba(196, 220, 222, 0.44);
    background: rgba(196, 220, 222, 0.08);
    color: rgba(224, 251, 252, 0.92);
  }

  .icon-button svg,
  .lobby-card svg {
    width: 22px;
    height: 22px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .utility-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .lobby-viewport {
    min-height: 100vh;
    padding: 0;
    background: var(--lobby-bg);
  }

  .lobby-page {
    display: flex;
    min-height: 100vh;
    overflow: hidden;
    background: var(--lobby-bg);
    color: var(--text);
  }

  .lobby-page__backdrop,
  .lobby-page__overlay,
  .lobby-page__hud-tint,
  .lobby-page__vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .lobby-page__backdrop {
    z-index: 0;
    background-image: url("assets/lobby-backdrop.png");
    background-position: center;
    background-size: cover;
    filter: grayscale(1) contrast(1.25) brightness(1.18);
    opacity: 0.56;
  }

  .lobby-page__overlay { z-index: 1; background: rgba(6, 14, 18, 0.035); }

  .lobby-page__hud-tint {
    z-index: 2;
    background:
      linear-gradient(90deg, rgba(25, 184, 190, 0.03), rgba(25, 184, 190, 0.012) 50%, rgba(25, 184, 190, 0.045)),
      linear-gradient(180deg, transparent, rgba(25, 184, 190, 0.01) 68%, rgba(14, 16, 18, 0.06)),
      rgba(8, 24, 28, 0.018);
  }

  .lobby-page__vignette {
    z-index: 4;
    opacity: 0.12;
    background: radial-gradient(circle, transparent 60%, rgba(0, 10, 20, 0.85) 100%);
  }

  .lobby-page__content {
    position: relative;
    z-index: 5;
    display: flex;
    width: 100%;
    min-height: inherit;
    flex-direction: column;
    gap: 16px;
    padding: 20px;
  }

  .lobby-page__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .lobby-page__spacer { min-height: 24px; flex: 1; }

  .lobby-page__console {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .lobby-card {
    display: flex;
    min-height: 96px;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    gap: 10px;
    border: 1px solid rgba(196, 220, 222, 0.34);
    background: var(--panel-soft);
    padding: 16px;
    color: var(--icon);
    text-align: left;
  }

  .lobby-card:hover {
    border-color: rgba(224, 251, 252, 0.5);
    background: rgba(196, 220, 222, 0.08);
    color: rgba(224, 251, 252, 0.92);
  }

  .lobby-card strong {
    font-family: var(--font-ui);
    font-size: 1.25rem;
    font-weight: 600;
    line-height: 1;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .lobby-page__footer {
    display: grid;
    gap: 6px;
    padding-top: 6px;
    color: rgba(255, 255, 255, 0.44);
    font-family: var(--font-mono);
    font-size: 0.56rem;
    letter-spacing: 0.08em;
    line-height: 1.5;
    text-transform: uppercase;
  }

  @media (min-width: 560px) {
    .lobby-page__console { grid-template-columns: 1fr 1fr; }
  }

  @media (min-width: 900px) {
    .lobby-page__content { padding: 32px; }
    .lobby-page__spacer { min-height: 120px; }
    .lobby-page__console {
      width: min(430px, 36vw);
      margin-left: auto;
      align-self: center;
    }
  }

  @media (min-width: 1180px) {
    .lobby-page__console { width: 430px; margin-right: 24px; }
  }

  @media (max-width: 720px) {
    .icon-button { width: 34px; height: 34px; }
  }

  @media (max-width: 560px) {
    .lobby-page__console { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <main class="lobby-viewport">
    <section class="sf-app lobby-page" aria-label="Seraph Field lobby">
      <div class="lobby-page__backdrop" aria-hidden="true"></div>
      <div class="lobby-page__overlay" aria-hidden="true"></div>
      <div class="lobby-page__hud-tint" aria-hidden="true"></div>
      <div class="lobby-page__vignette" aria-hidden="true"></div>

      <div class="lobby-page__content">
        <header class="lobby-page__header">
          <div aria-hidden="true"></div>
          <nav class="utility-nav" data-compact="true" aria-label="공통 메뉴">
            <a class="icon-button" href="#/" title="Lobby">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z" /></svg>
              <span class="sr-only">로비</span>
            </a>
            <a class="icon-button" href="#/wiki/profile" title="Profile">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4" /><path d="M4 21a8 8 0 0 1 16 0" /></svg>
              <span class="sr-only">프로필</span>
            </a>
            <a class="icon-button" href="#/search" title="Search">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7" /><path d="m20 20-4-4" /></svg>
              <span class="sr-only">검색</span>
            </a>
          </nav>
        </header>

        <div class="lobby-page__spacer" aria-hidden="true"></div>

        <nav class="lobby-page__console" aria-label="문서 카테고리">
          <a class="lobby-card" href="#/wiki?category=THEORY" aria-label="Theory documents">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 7v14" /><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z" /></svg>
            <strong>Theory</strong>
          </a>
          <a class="lobby-card" href="#/wiki?category=PAPER" aria-label="Paper documents">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z" /><path d="M14 2v6h6M8 13h8M8 17h8" /></svg>
            <strong>Paper</strong>
          </a>
          <a class="lobby-card" href="#/wiki?category=REPO" aria-label="Repo documents">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m18 16 4-4-4-4M6 8l-4 4 4 4M14.5 4l-5 16" /></svg>
            <strong>Repo</strong>
          </a>
          <a class="lobby-card" href="#/wiki?category=IMPLEMENT" aria-label="Implement documents">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 17 6-6-6-6M12 19h8" /></svg>
            <strong>Implement</strong>
          </a>
        </nav>

        <footer class="lobby-page__footer">
          <div>Background Image: Squad 31-A</div>
          <div>Heaven Burns Red ©WFS, Developed by Wright Flyer Studios, ©VISUAL ARTS/Key</div>
        </footer>
      </div>
    </section>
  </main>
</body>
</html>
