<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seraph Field Lobby Trim Sample</title>
    <style>
      :root {
        --bg: #061014;
        --cyan: rgb(25, 184, 190);
        --cyan-bright: rgb(60, 238, 244);
        --nav-icon: rgba(196, 220, 222, 0.72);
        --text: rgb(224, 251, 252);
        --muted: rgba(224, 251, 252, 0.62);
        --faint: rgba(224, 251, 252, 0.36);
        --panel: rgba(0, 0, 0, 0.3);
        --panel-strong: rgba(0, 0, 0, 0.42);
        --line: rgba(196, 220, 222, 0.34);
        --line-soft: rgba(196, 220, 222, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #2f3035;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
      }

      a,
      button,
      input {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        cursor: pointer;
      }

      .viewport {
        min-height: 100vh;
        padding: 16px;
      }

      .lobby {
        position: relative;
        display: flex;
        min-height: calc(100vh - 32px);
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
      }

      .backdrop {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      .backdrop img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        filter: grayscale(1) contrast(1.25) brightness(1.18);
        opacity: 0.56;
      }

      .overlay,
      .hud-tint,
      .scanlines,
      .vignette {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .overlay {
        background: rgba(6, 14, 18, 0.035);
        z-index: 1;
      }

      .hud-tint {
        z-index: 2;
        background:
          linear-gradient(90deg, rgba(25, 184, 190, 0.03) 0%, rgba(25, 184, 190, 0.012) 50%, rgba(25, 184, 190, 0.045) 100%),
          linear-gradient(180deg, rgba(25, 184, 190, 0) 0%, rgba(25, 184, 190, 0.01) 68%, rgba(14, 16, 18, 0.06) 100%),
          rgba(8, 24, 28, 0.018);
      }

      .scanlines {
        z-index: 3;
        background: linear-gradient(to bottom, transparent, transparent 50%, rgba(0, 0, 0, 0.22) 50%, rgba(0, 0, 0, 0.22));
        background-size: 100% 4px;
        opacity: 0.16;
      }

      .vignette {
        z-index: 4;
        background: radial-gradient(circle, rgba(0, 0, 0, 0) 60%, rgba(0, 10, 20, 0.85) 100%);
        opacity: 0.12;
      }

      .content {
        position: relative;
        z-index: 5;
        display: flex;
        width: 100%;
        min-height: inherit;
        flex-direction: column;
        gap: 16px;
        padding: 20px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .top-nav a,
      .credit {
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        text-transform: uppercase;
      }

      .top-nav {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .top-nav a {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border: 1px solid transparent;
        color: var(--nav-icon);
      }

      .top-nav a:hover {
        border-color: rgba(196, 220, 222, 0.44);
        background: rgba(196, 220, 222, 0.08);
        color: rgba(224, 251, 252, 0.92);
      }

      .top-nav svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        stroke-width: 1.8;
        fill: none;
      }

      .spacer {
        min-height: 24px;
        flex: 1;
      }

      .main-stack {
        display: grid;
        gap: 16px;
      }

      .category-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .category-card {
        display: flex;
        min-height: 96px;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 10px;
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 16px;
        color: var(--nav-icon);
        text-align: left;
      }

      .category-card svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        stroke-width: 1.8;
        fill: none;
      }

      .category-card strong {
        font-size: 19px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .category-card:hover {
        border-color: rgba(224, 251, 252, 0.5);
        background: rgba(196, 220, 222, 0.08);
        color: rgba(224, 251, 252, 0.92);
      }

      .footer {
        display: grid;
        gap: 6px;
        padding-top: 6px;
      }

      .credit {
        color: rgba(255, 255, 255, 0.44);
        font-size: 9px;
        letter-spacing: 0.08em;
        line-height: 1.5;
      }

      @media (min-width: 560px) {
        .category-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (min-width: 900px) {
        .viewport {
          padding: 26px;
        }

        .lobby {
          min-height: calc(100vh - 52px);
        }

        .content {
          padding: 32px;
        }

        .spacer {
          min-height: 120px;
        }

        .main-stack {
          width: min(430px, 36vw);
          margin-left: auto;
          align-self: center;
        }

        .category-card {
          min-height: 96px;
        }
      }

      @media (min-width: 1180px) {
        .main-stack {
          width: 430px;
          margin-right: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="viewport">
      <section class="lobby" aria-label="Seraph Field lobby">
        <div class="backdrop" aria-hidden="true">
          <img src="reference/SeraphField/seraph-field-site/public/4th_aniv.png" alt="" />
        </div>
        <div class="overlay" aria-hidden="true"></div>
        <div class="hud-tint" aria-hidden="true"></div>
        <div class="scanlines" aria-hidden="true"></div>
        <div class="vignette" aria-hidden="true"></div>

        <div class="content">
          <header class="topbar">
            <div aria-hidden="true"></div>
            <nav class="top-nav" aria-label="Primary navigation">
              <a href="#/" aria-label="Home">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 10.5 12 4l8 6.5V20H6v-7h12" />
                </svg>
              </a>
              <a href="#/wiki/profile" aria-label="Profile">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="8" r="3.5" />
                  <path d="M5 20c1.3-4 3.7-6 7-6s5.7 2 7 6" />
                </svg>
              </a>
              <a href="#/search" aria-label="Search">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="6" />
                  <path d="m16 16 4 4" />
                </svg>
              </a>
            </nav>
          </header>

          <div class="spacer" aria-hidden="true"></div>

          <div class="main-stack">
            <nav class="category-grid" aria-label="Document categories">
              <a class="category-card" href="#/wiki?category=THEORY">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 5.5c2.4 0 4.3.5 6 1.7v11.3c-1.7-1.2-3.6-1.7-6-1.7V5.5Z" />
                  <path d="M20 5.5c-2.4 0-4.3.5-6 1.7v11.3c1.7-1.2 3.6-1.7 6-1.7V5.5Z" />
                </svg>
                <strong>Theory</strong>
              </a>
              <a class="category-card" href="#/wiki?category=PAPER">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M6 3.5h8l4 4V20.5H6V3.5Z" />
                  <path d="M14 3.5v4h4M9 12h6M9 15h6" />
                </svg>
                <strong>Paper</strong>
              </a>
              <a class="category-card" href="#/wiki?category=REPO">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 8 4 12l4 4M16 8l4 4-4 4M14 5l-4 14" />
                </svg>
                <strong>Repo</strong>
              </a>
              <a class="category-card" href="#/wiki?category=IMPLEMENT">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 5l8 7-8 7" />
                </svg>
                <strong>Implement</strong>
              </a>
            </nav>

          </div>

          <footer class="footer">
            <div class="credit">Background Image: Squad 31-A</div>
            <div class="credit">Heaven Burns Red ©WFS, Developed by Wright Flyer Studios, ©VISUAL ARTS/Key</div>
          </footer>
        </div>
      </section>
    </main>
  </body>
</html>
